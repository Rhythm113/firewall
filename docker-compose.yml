version: '3.8'

services:
  apache-server-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apache-2.4.26-node1
    cap_add:
      - NET_ADMIN
    ports:
      - "80:80"            # Exposed Node 1 on port 80
    environment:
      - UPLOAD_DIR=/var/www/uploads
    volumes:
      - ./signatures:/etc/fw_inspect
      - ./keys/agent1:/etc/fw_keys
    depends_on:
      - soc-server
    restart: unless-stopped

  apache-server-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apache-2.4.26-node2
    cap_add:
      - NET_ADMIN
    ports:
      - "81:80"            # Exposed Node 2 on port 81
    environment:
      - UPLOAD_DIR=/var/www/uploads
    volumes:
      - ./signatures:/etc/fw_inspect
      - ./keys/agent2:/etc/fw_keys
    depends_on:
      - soc-server
    restart: unless-stopped

  soc-server:
    build:
      context: ./soc-server
      dockerfile: Dockerfile
    container_name: soc-dashboard
    ports:
      - "1113:1113"        # PGP-encrypted agent ingest port
      - "8443:8443"        # Web dashboard port
    volumes:
      - soc-data:/var/lib/soc
      - ./keys:/etc/keys
      - ./soc-config:/etc/soc:ro
    environment:
      - PGHOST=postgres
      - PGPORT=5432
      - PGDATABASE=nullsploit
      - PGUSER=nullsploit
      - PGPASSWORD=nullsploit_secure
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: soc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nullsploit
      POSTGRES_USER: nullsploit
      POSTGRES_PASSWORD: nullsploit_secure
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data

volumes:
  soc-data:
  pg-data:
